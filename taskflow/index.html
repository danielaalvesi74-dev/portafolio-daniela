<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TaskFlow • Flujo de tareas</title>

  <!-- CSS en la raíz (NO carpeta css/) -->
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg"></div>

  <header class="topbar">
    <div class="topbar-left">
      <h1>TaskFlow</h1>
      <p>Gestor de tareas con POO · ES6+ · DOM · Eventos · Asincronía · API · localStorage</p>
    </div>

    <div class="topbar-actions">
      <button class="btn" id="btnDemo" type="button">✨ Demo</button>
      <button class="btn" id="btnSync" type="button">☁️ Sincronizar API</button>
      <button class="btn primary" id="btnClear" type="button">🧼 Limpiar</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Crear tarea</h2>

      <form id="formTarea" class="form">
        <label>
          <span>Descripción</span>
          <input id="inDesc" type="text" placeholder="Ej: estudiar JS 30 min" autocomplete="off" required />
        </label>

        <label>
          <span>Fecha límite (opcional)</span>
          <input id="inDeadline" type="datetime-local" />
        </label>

        <button class="btn primary" type="submit">➕ Agregar</button>
      </form>

      <p class="hint">Tip: escribe en el buscador (keyup) y usa el filtro por estado.</p>
    </section>

    <section class="card">
      <div class="row">
        <div>
          <h2>Tareas</h2>
          <p class="muted" id="stats">0 tarea(s)</p>
        </div>

        <div class="row right">
          <input id="inSearch" class="search" type="text" placeholder="Buscar (keyup)..." autocomplete="off" />
          <select id="selFilter" class="select">
            <option value="todas">Todas</option>
            <option value="pendiente">Pendientes</option>
            <option value="completada">Completadas</option>
          </select>
        </div>
      </div>

      <ul id="lista" class="list"></ul>
    </section>
  </main>

  <!-- Modal editar -->
  <dialog id="dlgEdit" class="dialog">
    <form method="dialog" class="dialog-body">
      <h3>Editar tarea</h3>

      <label>
        <span>Descripción</span>
        <input id="editDesc" type="text" />
      </label>

      <label>
        <span>Fecha límite (opcional)</span>
        <input id="editDeadline" type="datetime-local" />
      </label>

      <menu class="dialog-actions">
        <button class="btn" value="cancel">Cancelar</button>
        <button class="btn primary" id="btnSaveEdit" value="default">Guardar</button>
      </menu>
    </form>
  </dialog>

  <!-- Toast -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- JS modular -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
