<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eco Market</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Eco Market</h1>
    <p>Productos ecológicos para un estilo de vida sostenible</p>
  </header>

  <section class="productos">

    <div class="card">
      <h3>Bolsa reutilizable</h3>
      <p>Hecha de materiales reciclados.</p>
      <span>$2.990</span>
    </div>

    <div class="card">
      <h3>Botella ecológica</h3>
      <p>Reduce el uso de plástico.</p>
      <span>$5.990</span>
    </div>

    <div class="card">
      <h3>Cepillo de bambú</h3>
      <p>Alternativa sustentable.</p>
      <span>$1.990</span>
    </div>

  </section>

  <footer>
    <p>Proyecto desarrollado con HTML y CSS</p>
  </footer>

</body>
</html>
